<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peanut's Treasure Hunt</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #2c003e, #fe346e);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            overflow: hidden;
        }

        h1 {
            margin: 5px 0;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.6);
            color: #ffc7e9;
        }

        #game-container {
            position: relative;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            overflow: hidden;
            border: 4px solid #d24dff;
        }

        canvas {
            display: block;
            background: #4a0e4e;
        }

        .instructions {
            margin-top: 10px;
            font-size: 14px;
            color: #ffb3ff;
            text-align: center;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 20px;
            border-radius: 20px;
        }
    </style>
</head>
<body>

    <h1>🥜 Peanut's Map Quest 🗺️</h1>
    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="450"></canvas>
    </div>
    <div class="instructions">
        <strong>Controls:</strong> ⬅️ / ➡️ Move Left/Right | ⬆️ Jump | ⬇️ Duck | Press <strong>Spacebar</strong> to Restart if Game Over
    </div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// Game State Variables
let currentLevel = 1;
const maxLevels = 12;
let lives = 3;
let gameState = "START"; // START, PLAYING, LEVEL_COMPLETE, GAME_OVER, WIN
let mapPiecesCollected = 0;
let mapPiecesRequired = 3;

// Key state tracker
const keys = {
    ArrowLeft: false,
    ArrowRight: false,
    ArrowUp: false,
    ArrowDown: false,
    Space: false
};

// Player (Peanut) Object
const player = {
    x: 50,
    y: 300,
    width: 30,
    height: 50,
    baseHeight: 50,
    duckHeight: 25,
    vx: 0,
    vy: 0,
    speed: 5,
    gravity: 0.6,
    jumpForce: -12,
    isGrounded: false,
    isDucking: false,
    facingRight: true,
    invulnerableFrames: 0,
    
    resetPosition() {
        this.x = 50;
        this.y = 300;
        this.vx = 0;
        this.vy = 0;
        this.isDucking = false;
        this.height = this.baseHeight;
    },

    update() {
        // Invulnerability cooldown
        if (this.invulnerableFrames > 0) this.invulnerableFrames--;

        // Handle Ducking
        if (keys.ArrowDown && this.isGrounded) {
            if (!this.isDucking) {
                this.isDucking = true;
                this.height = this.duckHeight;
                this.y += (this.baseHeight - this.duckHeight); // Snap to ground
            }
        } else {
            if (this.isDucking) {
                // Check if space overhead before standing up (simplified for this layout)
                this.isDucking = false;
                this.y -= (this.baseHeight - this.duckHeight);
                this.height = this.baseHeight;
            }
        }

        // Horizontal movement (Slower if ducking)
        let currentSpeed = this.isDucking ? this.speed * 0.4 : this.speed;
        if (keys.ArrowLeft) {
            this.vx = -currentSpeed;
            this.facingRight = false;
        } else if (keys.ArrowRight) {
            this.vx = currentSpeed;
            this.facingRight = true;
        } else {
            this.vx = 0;
        }

        // Jump mechanics
        if (keys.ArrowUp && this.isGrounded && !this.isDucking) {
            this.vy = this.jumpForce;
            this.isGrounded = false;
        }

        // Apply Gravity
        this.vy += this.gravity;
        this.x += this.vx;
        this.y += this.vy;

        // Screen Boundaries
        if (this.x < 0) this.x = 0;
        if (this.x + this.width > canvas.width) this.x = canvas.width - this.width;
    }
};

// Environmental Elements
let platforms = [];
let enemies = [];
let mapPieces = [];

// Event Listeners for Controls
window.addEventListener("keydown", (e) => {
    if (e.code in keys) {
        keys[e.code] = true;
        if(e.code.startsWith("Arrow")) e.preventDefault(); // Stop page scrolling
    }
    if (e.code === "Space") {
        if (gameState === "START") {
            startLevel(1);
            gameState = "PLAYING";
        } else if (gameState === "GAME_OVER" || gameState === "WIN") {
            lives = 3;
            startLevel(1);
            gameState = "PLAYING";
        } else if (gameState === "LEVEL_COMPLETE") {
            if (currentLevel <= maxLevels) {
                startLevel(currentLevel);
                gameState = "PLAYING";
            }
        }
    }
});

window.addEventListener("keyup", (e) => {
    if (e.code in keys) keys[e.code] = false;
});

// Procedural Level Setup Generator
function startLevel(levelNum) {
    currentLevel = levelNum;
    mapPiecesCollected = 0;
    player.resetPosition();
    
    // Scale properties with levels to make it progressively harder
    mapPiecesRequired = 2 + Math.floor(levelNum / 4); 
    let enemyCount = 2 + Math.floor(levelNum * 0.8);
    let enemySpeed = 1.5 + (levelNum * 0.25);

    // 1. Build Custom Level Layouts (Platforms)
    platforms = [
        { x: 0, y: 400, width: 800, height: 50, type: 'ground' } // Baseline Floor
    ];

    // Generate random but fair platform tiers based on level difficulty
    let platformPositions = [
        {x: 150, y: 300, w: 140},
        {x: 350, y: 220, w: 160},
        {x: 580, y: 300, w: 140},
        {x: 200, y: 130, w: 150},
        {x: 480, y: 120, w: 150}
    ];

    // Add high obstacles to force ducking in higher levels
    if (levelNum >= 3) {
        platforms.push({ x: 380, y: 0, width: 60, height: 140, type: 'ceiling' }); // Dropdown pillar
    }
    if (levelNum >= 6) {
        platforms.push({ x: 100, y: 0, width: 50, height: 200, type: 'ceiling' });
    }

    platformPositions.forEach(p => {
        platforms.push({ x: p.x, y: p.y, width: p.w, height: 20, type: 'float' });
    });

    // 2. Spawn Map Pieces safely above platforms
    mapPieces = [];
    let availablePlatforms = [...platforms].filter(p => p.type !== 'ceiling');
    
    for (let i = 0; i < mapPiecesRequired; i++) {
        let plat = availablePlatforms[Math.floor(Math.random() * availablePlatforms.length)];
        mapPieces.push({
            x: plat.x + (Math.random() * (plat.width - 20)) + 10,
            y: plat.y - 30,
            width: 20,
            height: 20,
            collected: false,
            pulse: 0
        });
    }

    // 3. Spawn Green Blob Enemies
    enemies = [];
    for (let i = 0; i < enemyCount; i++) {
        // Avoid spawning directly on top of player start position
        let rx = 200 + (Math.random() * 550);
        let ry = 370; // ground level blobs default
        
        // Put some enemies on high platforms in later levels
        if (levelNum > 2 && Math.random() > 0.5) {
            let highPlat = platforms[Math.floor(Math.random() * (platforms.length - 1)) + 1];
            if(highPlat.type === 'float') {
                rx = highPlat.x + 10;
                ry = highPlat.y - 30;
            }
        }

        enemies.push({
            x: rx,
            y: ry,
            width: 30,
            height: 30,
            vx: (Math.random() > 0.5 ? 1 : -1) * enemySpeed,
            minX: 0, // Bound boxes configured dynamic in loop
            maxX: canvas.width,
            wobble: Math.random() * Math.PI
        });
    }
}

// Axis-Aligned Bounding Box Collision Engine
function checkCollision(rect1, rect2) {
    return rect1.x < rect2.x + rect2.width &&
           rect1.x + rect1.width > rect2.x &&
           rect1.y < rect2.y + rect2.height &&
           rect1.y + rect1.height > rect2.y;
}

// Core Update Loop
function update() {
    if (gameState !== "PLAYING") return;

    player.update();

    // Platform Physics & Collision Resolution
    player.isGrounded = false;
    platforms.forEach(plat => {
        // Basic landing resolution
        if (
            player.x + player.width > plat.x &&
            player.x < plat.x + plat.width &&
            player.y + player.height >= plat.y &&
            player.y + player.height - player.vy <= plat.y + 12 &&
            player.vy >= 0
        ) {
            player.isGrounded = true;
            player.vy = 0;
            player.y = plat.y - player.height;
        }

        // Ceiling pillar block hit check
        if (plat.type === 'ceiling' && checkCollision(player, plat)) {
            player.x -= player.vx; // Push back horizontally
            if(player.y < plat.height) {
                player.vy = 0;
                player.y = plat.height + 1;
            }
        }
    });

    // Handle Enemies AI & Movements
    enemies.forEach(enemy => {
        enemy.x += enemy.vx;
        enemy.wobble += 0.15;

        // Bounce off walls
        if (enemy.x <= 0 || enemy.x + enemy.width >= canvas.width) {
            enemy.vx *= -1;
        }

        // Platform border checks to keep them patrolling nicely
        platforms.forEach(plat => {
            if (enemy.y + enemy.height === plat.y) {
                if (enemy.x < plat.x || enemy.x + enemy.width > plat.x + plat.width) {
                    enemy.vx *= -1;
                }
            }
        });

        // Player collision with Green Blobs
        if (checkCollision(player, enemy) && player.invulnerableFrames === 0) {
            lives--;
            player.invulnerableFrames = 60; // 1 second flash buffer
            if (lives <= 0) {
                gameState = "GAME_OVER";
            }
        }
    });

    // Handle Treasures Items Pickup
    mapPieces.forEach(piece => {
        if (!piece.collected && checkCollision(player, piece)) {
            piece.collected = true;
            mapPiecesCollected++;
            
            // Check win parameter criteria
            if (mapPiecesCollected >= mapPiecesRequired) {
                if (currentLevel === maxLevels) {
                    gameState = "WIN";
                } else {
                    currentLevel++;
                    gameState = "LEVEL_COMPLETE";
                }
            }
        }
    });
}

// Master Render Graphics Canvas Pipeline
function draw() {
    // Clear display with beautiful custom Purple background matrix
    ctx.fillStyle = "#320b3c";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Design stylized background decor grids
    ctx.fillStyle = "rgba(254, 52, 110, 0.05)";
    for (let i = 0; i < canvas.width; i += 40) {
        ctx.fillRect(i, 0, 2, canvas.height);
    }

    // Render Platforms (Neon Pink/Purple styles)
    platforms.forEach(plat => {
        ctx.fillStyle = plat.type === 'ground' ? '#fe346e' : '#d24dff';
        ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
        
        // Highlight borders
        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth = 2;
        ctx.strokeRect(plat.x, plat.y, plat.width, plat.height);
    });

    // Render Map Treasure Collectibles
    mapPieces.forEach(piece => {
        if (!piece.collected) {
            piece.pulse += 0.1;
            let offset = Math.sin(piece.pulse) * 4;
            
            ctx.fillStyle = "#ffcc00";
            ctx.save();
            ctx.translate(piece.x + 10, piece.y + 10 + offset);
            
            // Draw rolled up scroll map shape
            ctx.fillRect(-10, -8, 20, 16);
            ctx.fillStyle = "#e6b800";
            ctx.fillRect(-6, -8, 12, 16);
            ctx.fillStyle = "#ff3300"; // Red ribbon seal strap
            ctx.fillRect(-2, -8, 4, 16);
            ctx.restore();
        }
    });

    // Render Enemies (Green Blobs with Big Eyes)
    enemies.forEach(enemy => {
        let squash = Math.sin(enemy.wobble) * 3;
        ctx.fillStyle = "#39ff14"; // Neon Green
        
        // Main Blob Body shape
        ctx.beginPath();
        ctx.ellipse(
            enemy.x + enemy.width / 2, 
            enemy.y + enemy.height / 2 + (squash / 2), 
            enemy.width / 2, 
            (enemy.height / 2) - (squash / 2), 
            0, 0, 2 * Math.PI
        );
        ctx.fill();
        ctx.strokeStyle = "#229908";
        ctx.stroke();

        // Draw Animated Cartoon Eyes
        ctx.fillStyle = "white";
        ctx.beginPath();
        ctx.arc(enemy.x + 10, enemy.y + 12, 5, 0, 2 * Math.PI);
        ctx.arc(enemy.x + 20, enemy.y + 12, 5, 0, 2 * Math.PI);
        ctx.fill();

        ctx.fillStyle = "black";
        ctx.beginPath();
        let lookDir = enemy.vx > 0 ? 1 : -1;
        ctx.arc(enemy.x + 10 + lookDir, enemy.y + 12, 2, 0, 2 * Math.PI);
        ctx.arc(enemy.x + 20 + lookDir, enemy.y + 12, 2, 0, 2 * Math.PI);
        ctx.fill();
    });

    // Render Player (The cute Peanut)
    if (player.invulnerableFrames === 0 || Math.floor(player.invulnerableFrames / 4) % 2 === 0) {
        ctx.save();
        ctx.translate(player.x + player.width / 2, player.y + player.height / 2);
        
        // Draw standard peanut shell shape (hourglass symmetry)
        ctx.fillStyle = "#e3a857"; // Golden brown peanut shell color
        ctx.strokeStyle = "#ad742b";
        ctx.lineWidth = 3;

        ctx.beginPath();
        if (!player.isDucking) {
            // Upper bulb
            ctx.arc(0, -10, 14, 0, 2 * Math.PI);
            // Lower bulb
            ctx.arc(0, 12, 15, 0, 2 * Math.PI);
        } else {
            // Flattened ducking layout
            ctx.ellipse(0, 0, 18, 12, 0, 0, 2 * Math.PI);
        }
        ctx.fill();
        ctx.stroke();

        // Draw Face Details (Cute Eyes depending on direction)
        ctx.fillStyle = "#331a00";
        let eyeXOffset = player.facingRight ? 5 : -5;
        if (!player.isDucking) {
            ctx.beginPath();
            ctx.arc(-3 + eyeXOffset, -12, 3, 0, 2 * Math.PI);
            ctx.arc(5 + eyeXOffset, -12, 3, 0, 2 * Math.PI);
            ctx.fill();
            // Rosy Pink Cheeks
            ctx.fillStyle = "#ff66cc";
            ctx.beginPath();
            ctx.arc(-7 + eyeXOffset, -7, 3, 0, 2 * Math.PI);
            ctx.arc(9 + eyeXOffset, -7, 3, 0, 2 * Math.PI);
            ctx.fill();
        } else {
            // Closed happy squished eyes when ducking
            ctx.strokeStyle = "#331a00";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(eyeXOffset, -2, 3, 0, Math.PI, true);
            ctx.stroke();
        }
        ctx.restore();
    }

    // --- USER INTERFACE GRAPHICS HEADS UP DISPLAY (HUD) ---
    // Background HUD Strip
    ctx.fillStyle = "rgba(0, 0, 0, 0.4)";
    ctx.fillRect(0, 0, canvas.width, 45);

    // Display Current Level Progress
    ctx.fillStyle = "#ffb3ff";
    ctx.font = "bold 18px sans-serif";
    ctx.fillText(`LEVEL: ${currentLevel} / ${maxLevels}`, 20, 28);

    // Display Collected Map Pieces
    ctx.fillStyle = "#ffcc00";
    ctx.fillText(`🗺️ Maps: ${mapPiecesCollected} / ${mapPiecesRequired}`, 220, 28);

    // Display Hearts Health Lives System
    ctx.fillStyle = "#ff3366";
    let heartsString = "";
    for(let h=0; h<3; h++) {
        heartsString += (h < lives) ? "❤️ " : "🖤 ";
    }
    ctx.fillText(`Lives: ${heartsString}`, 550, 28);

    // --- MENU OVERLAYS ENGINE PANELS ---
    if (gameState === "START") {
        ctx.fillStyle = "rgba(44, 0, 62, 0.9)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = "#ffc7e9";
        ctx.font = "bold 36px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("PEANUT'S MAP QUEST", canvas.width / 2, 180);
        
        ctx.fillStyle = "#ffffff";
        ctx.font = "20px sans-serif";
        ctx.fillText("Help Peanut escape the Green Blobs and find all pieces of the map!", canvas.width / 2, 230);
        ctx.fillStyle = "#ff346e";
        ctx.fillText("PRESS SPACEBAR TO START GAME", canvas.width / 2, 310);
        ctx.textAlign = "left"; // Reset defaults alignment
    }
    else if (gameState === "LEVEL_COMPLETE") {
        ctx.fillStyle = "rgba(0, 0, 0, 0.75)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = "#d24dff";
        ctx.font = "bold 40px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("LEVEL COMPLETED! 🎉", canvas.width / 2, 200);
        
        ctx.fillStyle = "#ffffff";
        ctx.font = "20px sans-serif";
        ctx.fillText(`Get ready for Level ${currentLevel}`, canvas.width / 2, 250);
        ctx.fillStyle = "#39ff14";
        ctx.fillText("PRESS SPACEBAR FOR NEXT CHALLENGE", canvas.width / 2, 320);
        ctx.textAlign = "left";
    }
    else if (gameState === "GAME_OVER") {
        ctx.fillStyle = "rgba(0, 0, 0, 0.85)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = "#ff3333";
        ctx.font = "bold 46px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("GAME OVER!", canvas.width / 2, 190);
        
        ctx.fillStyle = "#ffffff";
        ctx.font = "20px sans-serif";
        ctx.fillText(`You made it to Level ${currentLevel}`, canvas.width / 2, 240);
        ctx.fillStyle = "#ffcc00";
        ctx.fillText("PRESS SPACEBAR TO RESTART FROM LEVEL 1", canvas.width / 2, 320);
        ctx.textAlign = "left";
    }
    else if (gameState === "WIN") {
        ctx.fillStyle = "rgba(44, 0, 62, 0.95)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = "#ffcc00";
        ctx.font = "bold 48px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("👑 YOU WIN THE GAME! 👑", canvas.width / 2, 180);
        
        ctx.fillStyle = "#ffffff";
        ctx.font = "22px sans-serif";
        ctx.fillText("Peanut successfully built the whole entire treasure map!", canvas.width / 2, 240);
        ctx.fillStyle = "#39ff14";
        ctx.fillText("PRESS SPACEBAR TO PLAY AGAIN", canvas.width / 2, 320);
        ctx.textAlign = "left";
    }
}

// Global Core Loop Controller
function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

// Begin Operations loop initialization execution
gameLoop();
</script>

</body>
</html>
